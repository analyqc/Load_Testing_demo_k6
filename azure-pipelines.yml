trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Instalar Node.js (para convertir JSON a JUnit y generar HTML)
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Instalar Node.js'

# 2️⃣ Instalar k6
- task: Bash@3
  displayName: 'Instalar k6'
  inputs:
    targetType: 'inline'
    script: |
      sudo apt update
      sudo apt install -y gnupg software-properties-common curl
      curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
      echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
      sudo apt update
      sudo apt install -y k6
      k6 version

# 3️⃣ Ejecutar todos los scripts K6 y generar JSON
- task: Bash@3
  displayName: 'Ejecutar scripts de K6 y generar JSON'
  inputs:
    targetType: 'inline'
    script: |
      mkdir -p results
      for script in scripts/*.js; do
        echo "Ejecutando $script..."
        filename=$(basename "$script" .js)
        k6 run "$script" --out json=results/$filename.json
      done

# 4️⃣ Convertir JSON a JUnit XML para Test Plans
- task: Bash@3
  displayName: 'Convertir JSON a JUnit XML'
  inputs:
    targetType: 'inline'
    script: |
      npm install -g junit-report-builder
      mkdir -p results/xml
      for jsonfile in results/*.json; do
        name=$(basename "$jsonfile" .json)
        node -e "
          const fs = require('fs');
          const junit = require('junit-report-builder');
          const summary = JSON.parse(fs.readFileSync('$jsonfile'));
          const suite = junit.testSuite().name('K6 Test: $name');
          suite.testCase().className('K6').name('Requests').time(summary.metrics.http_reqs.duration.avg/1000);
          junit.writeTo('results/xml/$name.xml');
        "
      done

# 5️⃣ Generar HTML desde JSON
- task: Bash@3
  displayName: 'Generar HTML desde JSON'
  inputs:
    targetType: 'inline'
    script: |
      npm install -g k6-to-html
      mkdir -p report
      for jsonfile in results/*.json; do
        name=$(basename "$jsonfile" .json)
        npx k6-to-html "$jsonfile" -o report/$name.html
      done

# 6️⃣ Publicar Test Results en Azure Test Plans
- task: PublishTestResults@2
  displayName: 'Publicar resultados en Test Plans'
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'results/xml/*.xml'
    failTaskOnFailedTests: true

# 7️⃣ Publicar reporte HTML como Artifact
- task: PublishBuildArtifacts@1
  displayName: 'Publicar reporte HTML'
  inputs:
    PathtoPublish: 'report'
    ArtifactName: 'K6Report'
    publishLocation: 'Container'