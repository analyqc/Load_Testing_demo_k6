trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Instalar Node (necesario para xk6-junit)
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Instalar Node.js'

# 2️⃣ Instalar Snap y K6
- script: |
    sudo apt update
    sudo apt install -y snapd
    sudo snap install k6
    k6 version
  displayName: 'Instalar K6 vía Snap'

# 3️⃣ Instalar xk6-junit para convertir JSON -> XML
- script: |
    npm install -g xk6-junit
    xk6-junit --version
  displayName: 'Instalar xk6-junit'

# 4️⃣ Ejecutar scripts de K6 y generar JSON
- script: |
    mkdir -p results
    k6 run scripts/load.js --out json=results/load.json
    k6 run scripts/smoke.js --out json=results/smoke.json
  displayName: 'Ejecutar scripts de K6 y generar JSON'

# 5️⃣ Convertir JSON a JUnit XML
- script: |
    mkdir -p results/xml
    xk6-junit convert results/load.json -o results/xml/load.xml
    xk6-junit convert results/smoke.json -o results/xml/smoke.xml
  displayName: 'Convertir JSON a JUnit XML'

# 6️⃣ Generar reporte HTML con ReportGenerator
- task: ReportGenerator@5
  inputs:
    reports: 'results/xml/*.xml'
    targetdir: 'coveragereport'
    reporttypes: 'Html;HtmlSummary'
  displayName: 'Generar reporte HTML visual'

# 7️⃣ Publicar reporte como artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'coveragereport'
    ArtifactName: 'K6ReportHTML'
    publishLocation: 'Container'
  displayName: 'Publicar reporte como Artifact'

# 8️⃣ Publicar resultados de tests en Azure DevOps
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'results/xml/*.xml'
    failTaskOnFailedTests: true
  displayName: 'Publicar resultados de tests en Azure DevOps'