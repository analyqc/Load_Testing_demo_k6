trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1. Instalar Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Instalar Node.js'

# 2. Instalar K6
- script: |
    sudo apt update
    sudo apt install -y gnupg software-properties-common curl
    curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
    echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
    sudo apt update
    sudo apt install -y k6
    k6 version
  displayName: 'Instalar K6'

# 3. Crear carpeta para resultados
- script: |
    mkdir -p results
  displayName: 'Crear carpeta results'

# 4. Ejecutar scripts K6 y generar JSON
- script: |
    echo "Ejecutando scripts K6..."
    k6 run scripts/load.js --out json=results/load.json
    k6 run scripts/smoke.js --out json=results/smoke.json
  displayName: 'Ejecutar scripts K6 y generar JSON'

# 5. Convertir JSON a XML estilo JUnit
- script: |
    echo "Convirtiendo JSON a XML para Azure..."
    node -e "const fs = require('fs'); const path = require('path'); const scripts=['load','smoke']; scripts.forEach(s => { const jsonPath = path.join('results', s+'.json'); const xmlPath = path.join('results', s+'.xml'); if(fs.existsSync(jsonPath)){ const xml = \`<testsuites><testsuite name='\${s}' tests='1' failures='0'><testcase classname='k6' name='Test Execution'/></testsuite></testsuites>\`; fs.writeFileSync(xmlPath, xml); console.log('✅ ' + s + '.xml generado'); } });"
  displayName: 'Convertir JSON a JUnit XML'

# 6. Publicar resultados en la pestaña Tests
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'results/*.xml'
    failTaskOnFailedTests: false
  displayName: 'Publicar resultados K6 en Azure'

# 7. Publicar JSON como artefacto
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'results'
    ArtifactName: 'K6Results'
    publishLocation: 'Container'
  displayName: 'Publicar artefactos JSON de K6'