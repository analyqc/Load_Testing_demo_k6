trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Instalar K6
- script: |
    sudo apt-get update
    sudo apt-get install -y gnupg software-properties-common curl
    curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
    sudo apt-get update
    sudo apt-get install -y k6
  displayName: 'Instalar K6'

# 2️⃣ Ejecutar scripts de K6 y exportar JSON
- script: |
    mkdir -p results
    for script in scripts/*.js; do
      filename=$(basename $script .js)
      echo "Ejecutando $script..."
      # Ejecuta K6 y genera resultados en JSON
      k6 run $script --summary-export results/$filename.json
    done
  displayName: 'Ejecutar scripts de K6 y generar JSON'

# 3️⃣ Generar HTML desde JSON (usando k6 convert)
- script: |
    mkdir -p report
    for jsonfile in results/*.json; do
      filename=$(basename $jsonfile .json)
      echo "Generando HTML para $jsonfile..."
      k6 convert $jsonfile -o report/$filename.html
    done
  displayName: 'Convertir JSON a HTML'

# 4️⃣ Publicar HTML como artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'report'
    ArtifactName: 'K6ReportHTML'
  displayName: 'Publicar reporte HTML'

# 5️⃣ Crear results.xml para pestaña Tests
- script: |
    cat <<EOF > results.xml
    <testsuites>
      <testsuite name="K6 Load Test" tests="1" failures="0">
        <testcase classname="K6" name="Load Test Execution"/>
      </testsuite>
    </testsuites>
    EOF
  displayName: 'Crear results.xml'

# 6️⃣ Publicar Test Results (JUnit)
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'results.xml'
    failTaskOnFailedTests: false
  displayName: 'Publicar Test Results'